  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    background: #0a0211;
    color: #ffffff;
  }

  .page-wrap {
    min-height: 100vh;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px 40px 16px;
    background: #0a0211;
  }

  .main-card {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(124, 83, 186, 0.6), rgba(76, 43, 132, 0.52));
    border: 1px solid rgba(255, 255, 255, 0.14);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 12px 30px rgba(0, 0, 0, 0.25);
  }

  .logo-box {
    width: 92px;
    height: 92px;
    border-radius: 24px;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid rgba(255, 255, 255, 0.16);
    box-shadow: 0 10px 22px rgba(0, 0, 0, 0.3);
    background: rgba(20, 10, 40, 0.65);
  }

  .logo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .brand-block {
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: center;
    width: 100%;
    align-items: center;
  }

  .brand-title {
    margin: 0;
    font-size: clamp(28px, 6vw, 44px);
    line-height: 1;
    font-weight: 900;
    letter-spacing: -1.5px;
    color: #fff7d6;
  }

  .brand-title span {
    color: #ffd54d;
  }

  .status-line {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: clamp(16px, 3.5vw, 20px);
    font-weight: 800;
    color: #ffffff;
  }

  .status-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #31d76b;
    box-shadow: 0 0 0 6px rgba(49, 215, 107, 0.18), 0 0 20px rgba(49, 215, 107, 0.9);
    flex-shrink: 0;
    animation: pulseDot 1.8s infinite;
  }

  .top-bar,
  .offer-card,
  .feature-item,
  .bottom-status,
  .vip-pill {
    position: relative;
    overflow: hidden;
  }

  .top-bar::after,
  .offer-card::after,
  .feature-item::after,
  .bottom-status::after,
  .vip-pill::after {
    content: '';
    position: absolute;
    top: -120%;
    left: -40%;
    width: 36%;
    height: 320%;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0));
    transform: rotate(18deg);
    animation: shineSweep 6s linear infinite;
    pointer-events: none;
  }

  .vip-pill {
    animation: floatPill 3.2s ease-in-out infinite;
  }

  .vip-pill {
    align-self: center;
    padding: 18px 34px;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(108, 72, 170, 0.95), rgba(88, 54, 146, 0.95));
    border: 2px solid rgba(255, 228, 167, 0.38);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 10px 26px rgba(0, 0, 0, 0.22);
    color: #fff0b0;
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
  }

  .offer-card {
    padding: 28px 22px 24px 22px;
    border-radius: 34px;
    background: linear-gradient(180deg, rgba(118, 87, 118, 0.52), rgba(45, 22, 71, 0.82));
    border: 1px solid rgba(255, 255, 255, 0.14);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14), 0 18px 44px rgba(0, 0, 0, 0.28);
    text-align: center;
  }

  .offer-label {
    margin: 0 0 14px 0;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .offer-value {
    margin: 0;
    font-size: clamp(88px, 24vw, 190px);
    line-height: 0.9;
    font-weight: 900;
    letter-spacing: -5px;
    color: #ffcf3f;
    text-shadow: 0 2px 0 #fff0a0, 0 8px 24px rgba(255, 207, 63, 0.28);
  }

  .offer-text {
    margin: 12px 0 18px 0;
    font-size: clamp(26px, 6vw, 54px);
    line-height: 1.02;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -1.5px;
  }

  .description {
    margin: 0 auto 24px auto;
    max-width: 460px;
    color: rgba(255, 255, 255, 0.9);
    font-size: clamp(18px, 3.8vw, 28px);
    line-height: 1.35;
    font-weight: 700;
  }

  .cta-button {
    width: 100%;
    border: none;
    border-radius: 26px;
    padding: 22px 20px;
    background: linear-gradient(180deg, #35e37b 0%, #19b84f 100%);
    color: #ffffff;
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 900;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), 0 16px 34px rgba(25, 184, 79, 0.34);
    text-transform: uppercase;
  }

  .feature-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-top: 18px;
  }

  .feature-item {
    min-height: 152px;
    padding: 18px 14px;
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(54, 75, 79, 0.55), rgba(50, 32, 76, 0.75));
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
    text-align: center;
  }

  .feature-icon {
